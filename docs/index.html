<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title></title>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <header>
        <h1></h1>
        <p id="subtitle"></p>
    </header>

    <main>
        <div id="modal" class="hidden">

            <div class="modal-content">
                
                <h2 id="question-value"></h2>
                <h3 id="question-category"></h3>
                <p id="question-text"></p>

                <p id="answer-text">

                    Aquí aparecerá la respuesta.

                </p>

                <div class="modal-buttons">

                    <button id="show-answer">

                        Mostrar respuesta

                    </button>

                    <button id="close-modal">

                        Cerrar

                    </button>

                </div>

                <div id="evaluation-panel" class="hidden">

                    <h3>¿Quién respondió?</h3>

                    <div id="player-options"></div>

                    <h3>Resultado</h3>

                    <div class="result-buttons">

                        <button
                            id="correct-answer"
                            class="success">

                            ✔ Correcta

                        </button>

                        <button
                            id="incorrect-answer"
                            class="danger">

                            ✘ Incorrecta

                        </button>

                    </div>

                </div>

            </div>

        </div>

        <section id="board"></section>

    </main>
    <div id="player-setup" class="modal-overlay">

        <div class="modal-content player-modal">

            <h2>Nueva partida</h2>

            <div class="form-group">

                <label for="player-count">

                    Número de jugadores

                </label>

                <select id="player-count">

                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3" selected>3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>

                </select>

            </div>

            <div id="player-inputs"></div>

            <div class="modal-buttons">

                <button id="start-game">

                    Comenzar partida

                </button>

            </div>

        </div>

    </div>
    <div id="leaderboard-modal" class="modal hidden">

        <div class="modal-content">

            <h2 id="leaderboard-title">
                Clasificación
            </h2>

            <div id="leaderboard-list"></div>

            <p id="leaderboard-progress"></p>

            <button id="continue-game">
                Continuar
            </button>

        </div>

    </div>
    <script type="module" src="js/app.js"></script>

</body>

</html>
